# Server Configuration
server.port=8080
spring.application.name=attendance-system

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/attendance_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Par123iop
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=your-secret-key-change-this-in-production-min-256-bits-long-enough-for-hs256
jwt.expiration=86400000

# WhatsApp Service Configuration
whatsapp.service.url=${WHATSAPP_SERVICE_URL:http://localhost:3001}

# School Configuration
school.name=Smart School
school.absent.threshold=3
school.lookback.days=30

# Session Timings for DEMO (24-hour format: HH:mm)
# Morning 1 is set to current time range for demo purposes
session.morning1.start=18:00
session.morning1.end=23:00
session.morning2.start=11:15
session.morning2.end=12:15
session.afternoon1.start=13:00
session.afternoon1.end=14:00
session.afternoon2.start=14:15
session.afternoon2.end=15:15

# Scheduler Configuration - Auto send messages after session ends
attendance.scheduler.morning1-cron=0 35 9 * * ?
attendance.scheduler.morning2-cron=0 15 11 * * ?
attendance.scheduler.afternoon1-cron=0 35 13 * * ?
attendance.scheduler.afternoon2-cron=0 15 15 * * ?
attendance.scheduler.weekly-report-cron=0 0 20 ? * SUN

# Logging
logging.level.com.school.attendance=DEBUG
logging.level.org.springframework.security=DEBUG

# Swagger/OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
